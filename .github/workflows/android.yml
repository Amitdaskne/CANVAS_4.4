name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Extract ZIP
        run: unzip -o CANVAS_4.4.zip

      - name: Show Structure
        run: |
          pwd
          find . -name gradlew
          find . -name build.gradle
          find . -type d | head -100
