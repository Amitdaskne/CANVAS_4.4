name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Extract ZIP
        run: unzip -o CANVAS_4.4.zip

      - name: Show Structure
        run: |
          pwd
          find . -name gradlew
          find . -name build.gradle

      - name: Grant Permission
        run: chmod +x "./CANVAS 4.4/CANVAS ALL FIX/NIKON/gradlew"

      - name: Build APK
        run: |
          cd "./CANVAS 4.4/CANVAS ALL FIX/NIKON"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: '**/*.apk'
